<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời Chúc Từ Hư Không</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #000; /* Nền đen */
            font-family: 'Arial', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        /* Màn hình nhập liệu */
        #input-screen {
            text-align: center; z-index: 10; transition: opacity 1s;
        }
        h2 { color: #fff; font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; }
        input {
            padding: 12px; border: 1px solid #333; background: #111;
            color: #ff4d6d; border-radius: 8px; outline: none; text-align: center; font-size: 1.1rem;
        }
        button {
            margin-top: 15px; padding: 10px 30px; background: #ff4d6d;
            color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        button:hover { background: #ff758f; transform: scale(1.05); }

        #flower-canvas { position: absolute; top: 0; left: 0; display: none; }
    </style>
</head>
<body>

    <div id="input-screen">
        <h2>NHẬP NGÀY SINH CỦA BẠN</h2>
        <input type="text" id="dob" placeholder="VD: 01/01">
        <br>
        <button onclick="startEffect()">XÁC NHẬN</button>
    </div>

    <canvas id="flower-canvas"></canvas>

    <script>
        const canvas = document.getElementById('flower-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const petals = [];
        const petalCount = 600; 
        const heartPoints = [];
        let textOpacity = 0; // Độ mờ của dòng chữ ở giữa

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function calculateHeart() {
            for (let i = 0; i < petalCount; i++) {
                const t = (i / petalCount) * Math.PI * 2;
                const r = Math.min(width, height) * 0.022; 
                const x = 16 * Math.pow(Math.sin(t), 3) * r;
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
                heartPoints.push({ x: x + width / 2, y: y + height / 2 });
            }
        }

        class Petal {
            constructor(target) {
                this.x = width / 2;
                this.y = height / 2;
                this.target = target;
                this.size = Math.random() * 7 + 3;
                this.color = `hsl(${Math.random() * 30 + 330}, 80%, 65%)`;
                this.speed = Math.random() * 0.015 + 0.005;
                this.angle = Math.random() * Math.PI * 2;
                this.opacity = 0;
            }

            update() {
                this.x += (this.target.x - this.x) * this.speed;
                this.y += (this.target.y - this.y) * this.speed;
                if (this.opacity < 1) this.opacity += 0.008;
                this.angle += 0.01;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size * 1.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.restore();
            }
        }

        function drawText() {
            if (textOpacity < 1) textOpacity += 0.005; // Chữ hiện lên từ từ
            ctx.save();
            ctx.globalAlpha = textOpacity;
            ctx.fillStyle = "#ffffff";
            ctx.font = "italic 24px 'Arial'";
            ctx.textAlign = "center";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff4d6d";
            ctx.fillText("Chúc một ngày tốt lành", width / 2, height / 2 + 10);
            ctx.restore();
        }

        function startEffect() {
            const val = document.getElementById('dob').value;
            if(!val) return alert("Vui lòng nhập ngày sinh!");

            document.getElementById('input-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('input-screen').style.display = 'none';
                canvas.style.display = 'block';
                initCanvas();
                calculateHeart();
                for (let i = 0; i < petalCount; i++) {
                    petals.push(new Petal(heartPoints[i]));
                }
                animate();
            }, 800);
        }

        function animate() {
            // Xóa nhẹ để tạo hiệu ứng chuyển động mượt
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, height);
            
            petals.forEach(p => p.update());
            
            // Vẽ chữ khi các cánh hoa đã bay được một lúc
            if (petals[0].opacity > 0.5) {
                drawText();
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            initCanvas();
            heartPoints.length = 0;
            calculateHeart();
        });
    </script>
</body>
</html>
